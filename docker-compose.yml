version: '3'

services:
  lldap:
    image: lldap/lldap:stable
    ports:
      - "17170:17170"
      - "389:3890"
    environment:
      - LLDAP_JWT_SECRET=${LLDAP_JWT_SECRET}
      - LLDAP_LDAP_USER_PASS=${LLDAP_LDAP_USER_PASS}
      - LLDAP_LDAP_BASE_DN=${LLDAP_LDAP_BASE_DN}
    volumes:
      - lldap_data:/data

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    depends_on:
      - lldap
    environment:
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD}
      - LLDAP_LDAP_BASE_DN=${LLDAP_LDAP_BASE_DN}

volumes:
  lldap_data: